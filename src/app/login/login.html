<div class="login-container">
  <div class="login-card">

    <h2>Welcome On Login</h2>
    <p class="subtitle">Please login to continue</p>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">

      <!-- Username -->
      <div class="form-group">
        <label>Username</label>
        <input type="text" formControlName="username" placeholder="Enter username" />

        <div class="error" *ngIf="loginForm.get('username')?.touched && loginForm.get('username')?.invalid">
          <small *ngIf="loginForm.get('username')?.errors?.['required']">
            Username is required
          </small>
        </div>
      </div>

      <!-- Password -->
      <div class="form-group">
        <label>Password</label>
        <input type="password" formControlName="password" placeholder="Enter password" />

        <div class="error" *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.invalid">
          <small>Password is required</small>
        </div>
      </div>

      <!-- BUTTON (IMPORTANT FIX) -->
      <!-- <button type="submit" [disabled]="loginForm.invalid">
        Login
      </button> -->

  <button type="submit" [disabled]="loginForm.invalid">
login
  </button>

    </form>

  </div>
</div>
